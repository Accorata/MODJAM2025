## Temporal Anomalies ##
  # Base Anomalies
  omnitemporal.1000.name: "Time Travel!"
  omnitemporal.1000.desc: "As [Root.GetLeaderName] and ... ship grew ever closer to the anomaly, they watched as their clocks began to run the other way, speeding up faster and faster as they travelled into the past. For obvious reasons, our communications with the crew end shortly after (or possibly before, depending on one's perspective), [Root.GetLeaderName] delved into the past.\n\nThis event explains our appearance of the ship and crew identical to the one we just lost. It appears they truly did travel accross time to bring us a new message. Valuable data was just acquired, and we will waste no time putting it to use."
  omnitemporal.1000.a: "Unbelievable!"
  omnitemporal.1000.a.tooltip: "[Root.GetLeaderName] Vanishes Back into the Past."

  omnitemporal.1001.name: "Voyager from the Future"
  omnitemporal.1001.desc: "..."
  omnitemporal.1001.a: "..."
  omnitemporal.1001.a.tooltip: "Another [event_target:otc_future_leader.GetLeaderName] Joins our Empire."

  omnitemporal.1003.name: "..."
  omnitemporal.1003.desc: "..."
  omnitemporal.1003.a: "..."
  omnitemporal.1003.a.tooltip: "..."

  omnitemporal.1004.name: "Planetary Cooling"
  omnitemporal.1004.desc: "Only a couple of months after our scientists discovered the accelerated passage of time on [FromFrom.GetName], the entire planet has cooled down to more moderate levels. It appears that this planet has experienced millenia of its lifecycle in mere months, transforming its volcanic surface into a barren expanse. According to readings taken from orbit, tectonic activity remains intense and the planet shows no signs of slowing down just yet.\n\nThe more adventurous of our scientists wish to explore [FromFrom.GetName] itself. However, they are quickly stopped by their wiser peers explanations that their lifespans would become but minute fractions of a second to any outside observer."
  omnitemporal.1004.a: "Very Interesting"

  omnitemporal.1005.name: "Development of Life"
  omnitemporal.1005.desc: "..."
  omnitemporal.1005.a: "Continue Observations"

