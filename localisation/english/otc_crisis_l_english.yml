  omnitemporal.54.name:0 "The End of Time"
  omnitemporal.54.desc:0 "..."
# draft for 'destructive' reading of end of time
# "Until now, we have been like children, content to delight in our new toys that mastery of time has gifted us. Those who dare oppose us are vanquished, and we consolidate our power in the fleeting instant we collectively call: 'the present'. But as our perspective grows, so too does the realisation of futility. We are still prisoners of linear time, unable to prevent our universe spiralling into entropy. No empires last forever.\n\nThe time has come to put aside our toys.\n\nWe have discovered a way to propagate our civilisation outside of linear time - to become truly free of the tyranny of cause and effect. All that it will require is for us to shatter time itself, forwards and back, and ride the shockwave into a new state of existance."
  omnitemporal.54.a:0 "Its about time."

