## Temporal Anomalies ##
  # Base Anomalies
  omnitemporal.1000.name: "Time Travel!"
  omnitemporal.1000.desc: "As [Root.GetLeaderName] grew ever closer to the anomaly, [Root.GetSheHe] watched as the clocks began to run the other way, speeding up faster and faster as the crew travelled into the past. For obvious reasons, our communications end shortly after (or possibly before, depending on one's perspective) [Root.GetLeaderName] delved into the past.\n\nThis event explains our appearance of the same crew identical to the one we just lost. It appears they truly did travel accross time. Valuable data was just acquired, and we will waste no time putting it to use."
  omnitemporal.1000.a: "Unbelievable!"
  omnitemporal.1000.a.tooltip: "[Root.GetLeaderName] Vanishes Back into the Past."

